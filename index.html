<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TECH.MA Secure</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="success-flash" id="flash"></div>

    <div class="login-box" id="box">
      <img src="images/logo.png" alt="Logo" class="logo" />
      <h1>TECH.MA</h1>
      <div class="subtitle">Project PFE</div>

      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">ACCESS</button>
      </form>

      <div class="error" id="errorMsg">⚠ ACCESS DENIED</div>
      <div class="spinner" id="spinner"></div>
    </div>

    <audio id="successSound" src="success.mp3"></audio>
    <div class="footer-left">© 2026 All Rights Reserved by TECH.MA</div>

    <script src="js/script.js"></script>
  </body>
</html>
